name: 每月更新个股率表

on:
  workflow_dispatch:       # 仅手动触发(碰运气)——云端共享IP 易被 Polygon 限速，工具表改由本地 build_ticker_stats 更新为主

permissions:
  contents: write          # 允许 commit 回仓库

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install requests "numpy==2.2.6" "pandas==2.3.3"   # 锁版本：与本地双版本验证过的一致，防 pandas 升级再引入 merge_asof 精度类隐藏差异
      - name: 拉最新 5 年数据 + 生成个股率表
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
        run: |
          python build_dataset.py        # 31标的5年日线+基本面 → historical_data/(临时)
          python build_labels.py         # → output/model_dataset.csv(临时)
          python gen_signal_config.py    # per-ticker 信号校准 → signal_config.js/json(进仓库)
          python build_ticker_stats.py   # → ticker_stats.js(工具用，进仓库)
      - name: 提交更新的信号配置 + 个股率表
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_config.js signal_config.json ticker_stats.js
          git diff --staged --quiet || git commit -m "chore: 每月自动更新 signal_config + ticker_stats [skip ci]"
          git push
