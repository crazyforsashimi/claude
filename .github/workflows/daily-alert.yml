name: 每日大机会告警

on:
  schedule:
    # 每交易日盘中扫 3 次(UTC；夏令时 EDT=UTC−4)：早盘~10:00 / 中盘~13:00 / 尾盘~15:45 美东
    - cron: "0 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "45 19 * * 1-5"
  workflow_dispatch:   # 允许在 Actions 页手动点「Run workflow」
    inputs:
      test:
        description: "只发一封测试通知(验证邮件/微信配置)，不做实际检测"
        type: boolean
        default: false

permissions:
  contents: write          # 允许 commit forward 记录 signal_log.json 回仓库

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖
        run: pip install requests "numpy==2.2.6" "pandas==2.3.3"   # 锁版本：与本地双版本验证过的一致，防 pandas 升级再引入 merge_asof 精度类隐藏差异
      - name: 检测并推送大机会
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          # 邮件(可选)：如需邮件推送，再在 Secrets 里加这几个
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          ALERT_TEST: ${{ github.event.inputs.test }}
        run: |
          python daily_alert.py
          python gen_forward_report.py    # 更新前瞻战绩报告(纯读 signal_log，无需 API)
      - name: 提交 forward 记录 + 报告
        if: ${{ github.event.inputs.test != 'true' }}   # 测试模式不动记录
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_log.json forward_report.html
          git diff --staged --quiet && exit 0            # 无新触发/无补算 → 不提交
          git commit -m "chore: forward 记录 + 报告更新 [skip ci]"
          git pull --rebase --autostash origin main || true   # 避免与其它 commit 冲突
          git push
